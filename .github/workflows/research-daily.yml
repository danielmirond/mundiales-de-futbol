name: Research diario (Google Trends + YouTube)

on:
  schedule:
    # 06:30 UTC todos los días (≈ 07:30 ES en invierno, 08:30 ES en verano)
    - cron: '30 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  research:
    name: Generar report del día
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run research
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run research

      - name: Commit report
        run: |
          set -e
          git config user.name "research-bot"
          git config user.email "research-bot@users.noreply.github.com"
          git add research/
          if git diff --staged --quiet; then
            echo "Sin cambios — no commit."
            exit 0
          fi
          DATE=$(date -u +%F)
          git commit -m "research: report ${DATE}"
          git push
