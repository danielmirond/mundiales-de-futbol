name: News bot diario (RSS → noticias)

on:
  schedule:
    # 07:00 UTC todos los días (08:00 / 09:00 ES). Una hora después del research.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Máximo de noticias a generar (default 5)'
        required: false
        default: '5'
      dry:
        description: 'Dry-run (no patchea ni commitea)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  news-bot:
    name: Generar noticias del día
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run news-bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_BOT_LIMIT: ${{ github.event.inputs.limit || '5' }}
          NEWS_BOT_DRY: ${{ github.event.inputs.dry == 'true' && '1' || '' }}
        run: npx tsx scripts/news-bot/index.ts

      - name: Open draft PR if changes
        if: ${{ github.event.inputs.dry != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if git diff --quiet src/lib/news.ts scripts/news-bot/state.json; then
            echo "Sin cambios — no PR."
            exit 0
          fi
          DATE=$(date -u +%F)
          BRANCH="news/auto-${DATE}"

          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/lib/news.ts scripts/news-bot/state.json
          git commit -m "auto(news): noticias del día ${DATE}"
          git push -u origin "$BRANCH"

          # Extract slugs added en el diff de news.ts para el body del PR
          ADDED_SLUGS=$(git show HEAD -- src/lib/news.ts | grep -E "^\+\s+slug:" | sed -E "s/^\+\s+slug:\s+'([^']+)'.*/\1/" || true)

          PR_BODY=$(cat <<EOF
          ## Noticias auto-generadas — ${DATE}

          Pipeline: RSS feeds → keyword/entity filter → Claude API → patch \`src/lib/news.ts\`.

          ### Slugs añadidos
          \`\`\`
          $ADDED_SLUGS
          \`\`\`

          ### Cómo revisar
          1. Lee cada \`title\` y \`summary\` — ¿el titular es preciso y honesto con el contenido?
          2. Lee el primer párrafo del \`body\` — ¿aporta contexto o solo traduce el lead del medio?
          3. Verifica que las rutas internas (\`/2026/...\`, \`/coleccionismo/...\`) existen.
          4. Si una noticia no encaja, bórrala del array en este PR antes de mergear.

          ### Filtros aplicados
          - Keyword core: \`Mundial 2026\`, \`World Cup 2026\`, \`FIFA 2026\`, \`Copa do Mundo 2026\`, \`Coupe du Monde 2026\`, \`CONCACAF host\`.
          - Stoplist: sub-20, femenino, Mundial 2030, Mundial de Clubes.
          - Dedup: hash por feed+título+url + slug match contra news.ts.

          🤖 Generated by [news-bot](scripts/news-bot/README.md)
          EOF
          )

          gh pr create \
            --draft \
            --title "auto(news): noticias del día ${DATE}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
